<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - URL Based</title>
    <link rel="icon" type="image/png" href="dashboard_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body class="bg-slate-50 p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Product Dashboard</h1>
                <p class="text-slate-500">Gunakan URL gambar untuk katalog yang lebih fleksibel.</p>
            </div>
            <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl text-sm font-bold">
                Total Produk: <span id="count">0</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold mb-6 text-slate-800 border-b pb-2">Informasi Produk</h3>
                    <form id="product-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Produk</label>
                            <input type="text" id="name" class="w-full border-slate-200 border p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Lampu LED 12W Hemat Energi" required>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Brand</label>
                                <input type="text" id="brand" class="w-full border-slate-200 border p-2.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Philips" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Kategori</label>
                                <select id="category" class="w-full border-slate-200 border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></select>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Harga</label>
                                <input type="number" id="price" class="w-full border-slate-200 border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="22000" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Coret</label>
                                <input type="number" id="oldPrice" class="w-full border-slate-200 border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="30000">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Stok</label>
                                <input type="number" id="stock" class="w-full border-slate-200 border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="50">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">URL Gambar (Pisahkan dengan Enter)</label>
                            <textarea id="images" class="w-full border-slate-200 border p-2.5 rounded-xl h-20 text-sm font-mono outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://link-gambar1.jpg&#10;https://link-gambar2.jpg"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Varian (Koma)</label>
                                <input type="text" id="variants" class="w-full border-slate-200 border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Putih, Kuning">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tags (Koma)</label>
                                <input type="text" id="tags" class="w-full border-slate-200 border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="best-seller, hemat">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Deskripsi Singkat</label>
                            <textarea id="description" class="w-full border-slate-200 border p-2.5 rounded-xl h-20 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Lampu LED terang dan tahan lama."></textarea>
                        </div>

                        <button type="button" onclick="addProduct()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                            Tambahkan Produk
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="bg-slate-900 rounded-3xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-blue-400 font-mono text-sm font-bold">RAW JSON OUTPUT</h3>
                        <button onclick="copyJson()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition">
                            <i class="fas fa-copy mr-2"></i>Copy JSON
                        </button>
                    </div>
                    <textarea id="json-output" class="w-full h-64 bg-transparent text-blue-100 font-mono text-xs outline-none resize-none border border-slate-700 p-4 rounded-xl" readonly></textarea>
                </div>

                <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                    <h3 class="font-bold mb-4 text-slate-800">Preview List</h3>
                    <div id="temp-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = ["Semua", "Lampu & Pencahayaan", "Kipas & Pendingin", "Televisi & Audio", "Peralatan Rumah Tangga", "Kabel & Aksesoris", "Lainnya"];
        let products = [];

        // Load Categories to Select
        const catSelect = document.getElementById('category');
        categories.filter(c => c !== "Semua").forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);

        function addProduct() {
            // Get Multiple Images from Textarea
            const imgText = document.getElementById('images').value;
            const imgArray = imgText.split('\n').filter(url => url.trim() !== "");
            
            // Get Variants & Tags from Comma
            const variantArray = document.getElementById('variants').value.split(',').map(v => v.trim()).filter(v => v !== "");
            const tagArray = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t !== "");

            const newProduct = {
                id: Date.now(),
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: parseInt(document.getElementById('price').value) || 0,
                oldPrice: parseInt(document.getElementById('oldPrice').value) || null,
                images: imgArray.length > 0 ? imgArray : ["https://via.placeholder.com/300?text=No+Image"],
                description: document.getElementById('description').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                brand: document.getElementById('brand').value,
                variants: variantArray,
                tags: tagArray
            };

            products.push(newProduct);
            updateView();
            document.getElementById('product-form').reset();
            // Reset categories to default
            document.getElementById('category').value = categories[1];
        }

        function updateView() {
            const output = {
                categories: categories,
                products: products
            };
            
            document.getElementById('json-output').value = JSON.stringify(output, null, 2);
            document.getElementById('count').textContent = products.length;

            const list = document.getElementById('temp-list');
            if(products.length === 0) {
                list.innerHTML = `<p class="text-slate-400 text-sm text-center py-4 italic">Belum ada produk ditambahkan</p>`;
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                    <img src="${p.images[0]}" class="w-12 h-12 rounded-lg object-cover bg-slate-200">
                    <div class="flex-grow">
                        <p class="font-bold text-sm text-slate-800 line-clamp-1">${p.name}</p>
                        <p class="text-[10px] text-blue-600 font-bold uppercase">${p.brand} • Rp ${p.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeProduct(${p.id})" class="text-red-400 hover:text-red-600 p-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).reverse().join('');
        }

        function removeProduct(id) {
            products = products.filter(p => p.id !== id);
            updateView();
        }

        function copyJson() {
            const copyText = document.getElementById("json-output");
            if (!copyText.value) return;
            copyText.select();
            document.execCommand("copy");
            alert("Data JSON berhasil disalin ke clipboard!");
        }

        updateView();
    </script>
</body>
</html>
